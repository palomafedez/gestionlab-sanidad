<!-- Modal Proveedor -->
<div class="modal-overlay" id="modal-proveedor">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-proveedor-title">Nuevo proveedor</div>
      <button class="modal-close" onclick="closeModal('modal-proveedor')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid form-grid-2">
        <div class="form-group full">
          <label>Nombre comercial *</label>
          <input id="prov-nombre" placeholder="Ej: Sigma-Aldrich">
        </div>
        <!-- TIPO PROVEEDOR: MULTI-SELECCIÓN CON CHIPS -->
        <div class="form-group full">
          <label>Tipo(s) de proveedor</label>
          <div class="checkbox-group" id="prov-tipos-group">
            <label class="checkbox-chip"><input type="checkbox" value="Reactivos"> Reactivos</label>
            <label class="checkbox-chip"><input type="checkbox" value="Consumibles"> Consumibles</label>
            <label class="checkbox-chip"><input type="checkbox" value="Equipos"> Equipos</label>
            <label class="checkbox-chip"><input type="checkbox" value="Servicio técnico"> Servicio técnico</label>
            <label class="checkbox-chip"><input type="checkbox" value="Material fungible"> Material fungible</label>
            <label class="checkbox-chip"><input type="checkbox" value="Otro"> Otro</label>
          </div>
        </div>
        <div class="form-group">
          <label>Persona de contacto</label>
          <input id="prov-contacto" placeholder="">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="prov-email" type="email" placeholder="">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input id="prov-telefono" placeholder="">
        </div>
        <div class="form-group">
          <label>Web</label>
          <input id="prov-web" placeholder="https://...">
        </div>
        <div class="form-group full">
          <label>Observaciones</label>
          <textarea id="prov-observaciones" placeholder="Plazos habituales, condiciones, notas..."></textarea>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-proveedor')">Cancelar</button>
        <button class="btn btn-primary" id="btn-guardar-proveedor" onclick="guardarProveedor()">Guardar proveedor</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Ubicación -->
<div class="modal-overlay" id="modal-ubicacion">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nueva ubicación</div>
      <button class="modal-close" onclick="closeModal('modal-ubicacion')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid form-grid-2">
        <div class="form-group">
          <label>ID Ubicación *</label>
          <input id="ubi-id" placeholder="Ej: MICRO-NEV1">
        </div>
        <div class="form-group">
          <label>Laboratorio / Aula *</label>
          <input id="ubi-lab" placeholder="Ej: Lab. Microbiología">
        </div>
        <div class="form-group">
          <label>Zona</label>
          <input id="ubi-zona" placeholder="Ej: Bancada norte">
        </div>
        <div class="form-group">
          <label>Subzona</label>
          <input id="ubi-subzona" placeholder="Ej: Estante 2">
        </div>
        <div class="form-group full">
          <label>Descripción completa</label>
          <textarea id="ubi-desc" placeholder=""></textarea>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-ubicacion')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarUbicacion()">Guardar ubicación</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Usuario -->
<div class="modal-overlay" id="modal-usuario">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nuevo usuario</div>
      <button class="modal-close" onclick="closeModal('modal-usuario')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid form-grid-2">
        <div class="form-group">
          <label>Nombre *</label>
          <input id="usr-nombre" placeholder="">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input id="usr-email" type="email" placeholder="">
        </div>
        <div class="form-group">
          <label>Rol *</label>
          <select id="usr-rol">
            <option>Administrador</option><option>Gestor</option>
            <option>Profesor</option><option>Alumno</option>
          </select>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-usuario')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarUsuario()">Guardar usuario</button>
      </div>
    </div>
  </div>
</div>
